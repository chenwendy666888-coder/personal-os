<style>

:root{
  --bg:#F5F3EF;--sf:#FFFFFF;--bd:#E8E4DC;--bd2:#D4CFC5;
  --nv:#1B2B4B;--bl:#2D52A0;--bl2:#4A7AC7;
  --tx:#1B2B4B;--tx2:#5A6478;--tx3:#9BA3AF;
  --ibg:#EBF0FB;--ibd:#C3D4F0;--itx:#2D52A0;
  --sbg:#EDF7F0;--sbd:#B8DDD0;--stx:#2E7D5E;
  --wbg:#FFF4EB;--wtx:#A07020;--sec:#F0EDE8;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Noto Sans SC',sans-serif;background:var(--bg);color:var(--tx);font-size:14px;min-height:100vh}
#app{max-width:500px;margin:0 auto;padding-bottom:16px}
.hdr{background:var(--sf);border-bottom:.5px solid var(--bd);padding:12px 16px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:9}
.hdr h1{font-size:16px;font-weight:500;color:var(--nv)}
.hdr p{font-size:11px;color:var(--tx2);margin-top:1px}
#ct{padding:12px}
.nav{background:var(--sf);border-top:.5px solid var(--bd);display:flex;padding:6px 0 max(10px,env(safe-area-inset-bottom));position:sticky;bottom:0}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;cursor:pointer;font-family:inherit;color:var(--tx2);font-size:9px;-webkit-tap-highlight-color:transparent}
.nb.on{color:var(--bl)}
.ic{font-size:15px;padding:2px 8px;border-radius:5px;display:block}
.nb.on .ic{background:var(--ibg)}

.tab.on{color:var(--bl);border-bottom-color:var(--bl)}
.hint{font-size:11px;color:var(--tx2);line-height:1.5;margin-bottom:7px;display:block}

.chip.n{background:var(--sec);color:var(--tx2)}
.pb{height:4px;background:var(--sec);border-radius:4px;overflow:hidden;margin-top:5px}

.sg2{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:10px}
.sp{background:var(--sf);border:.5px solid var(--bd);border-radius:9px;padding:9px 10px;position:relative;min-height:50px}
.sc4{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
.sc4 .si{background:var(--sec);border-radius:8px;padding:9px 11px;text-align:center}

<body>
<div id="app">
<div class="hdr"><div><h1 id="H">个人总览</h1><p id="D"></p></div><div style="display:flex;align-items:center;gap:8px">
<label title="导入数据" style="width:28px;height:28px;border-radius:7px;background:var(--sec);border:.5px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:13px;cursor:pointer" title="导入备份">↑<input type="file" accept=".json" style="display:none" onchange="importData(this)"></label>
<button onclick="exportData()" title="导出数据" style="width:28px;height:28px;border-radius:7px;background:var(--sec);border:.5px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:13px;cursor:pointer;color:var(--tx)">↓</button>
<div style="width:28px;height:28px;border-radius:7px;background:var(--nv);display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff">✦</div>
</div></div>
<div id="ct"></div>
<nav class="nav">
<button class="nb on" id="n0" onclick="go(0)"><span class="ic">◉</span><span>个人</span></button>

<button class="nb" id="n2" onclick="go(2)"><span class="ic">✦</span><span>想法</span></button>
<button class="nb" id="n3" onclick="go(3)"><span class="ic">◈</span><span>三观</span></button>
<button class="nb" id="n4" onclick="go(4)"><span class="ic">⊕</span><span>收集</span></button>
</nav>
</div>
<script>

var $=function(id){return document.getElementById(id)};
var ld=function(k,f){try{var v=localStorage.getItem(k);return v?JSON.parse(v):f}catch(e){return f}};
var sv=function(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}};
var ee=function(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')};
var td=function(){return new Date().toISOString().split('T')[0]};
$('D').textContent=new Date().toLocaleDateString('zh-CN',{month:'long',day:'numeric',weekday:'short'});
var PAGES=['个人总览','记录','想法','三观','收集'];
function go(i){
  $('H').textContent=PAGES[i];
  for(var j=0;j<5;j++){var b=$('n'+j);if(b)b.className='nb'+(j===i?' on':'');}
  $('ct').innerHTML='';
  [pMe,pRec,pIdeas,pViews,pCol][i]();
}
window.xp=function(id,btn,o,c){var el=$(id);if(!el)return;var s=el.style.display==='none';el.style.display=s?'block':'none';if(btn)btn.textContent=s?c:o};

var mT='skill',sK=null,mA=false;
var SKL=[['exec','执行力','能启动、能完成','你能否在没有外部压力下自主启动并完成任务？'],
         ['comm','表达力','说清楚、写清楚','你能否清晰地把想法传达给别人？'],
         ['fin','财商','理解钱的逻辑','你对财务、投资、财富积累的理解程度？'],
         ['soc','社交智慧','读懂人、处好关系','你在不同场合读懂他人意图并建立关系的能力？'],
         ['learn','学习力','吸收新知识','你能否快速理解新领域知识并实际应用？'],
         ['stress','抗压力','扛住后反弹','你在高压、挫折时保持状态的能力？']];
var WLD=[['edu','学历分位','e.g. 全球前5%大学'],['income','收入分位','参考所在国分布'],['lang','语言能力','e.g. 中英双语'],['network','人脉资源','行业前辈、海外导师'],['skill','核心竞争力','e.g. 数据分析+精算'],['location','地理优势','e.g. 伦敦→国际视野']];
window.meSw=function(t){mT=t;sK=null;mA=false;pMe()};
window.ckSk=function(id){sK=sK===id?null:id;mA=false;pMe()};
window.sP=function(f,v){var p=ld('os_p',{});p[f]=v;sv('os_p',p)};
window.sSk=function(id,v){var sk=ld('os_sk',{exec:5,comm:5,fin:5,soc:5,learn:5,stress:5});sk[id]=v;sv('os_sk',sk);var el=$('sv'+id);if(el)el.innerHTML=v+'<span style="font-size:10px;color:var(--tx2)">/10</span>'};
window.sWld=function(id,v){var w=ld('os_wld',{});w[id]=v;sv('os_wld',w)};
window.aFile=function(){var n=$('fn');var fc=$('fc');if(!n||!fc||!n.value.trim()||!fc.value.trim())return;var f=ld('os_files',[]);f.unshift({name:n.value.trim(),content:fc.value.trim(),date:td()});sv('os_files',f);pMe()};
window.upFile=function(inp){var file=inp.files[0];if(!file)return;var r=new FileReader();r.onload=function(ev){var f=ld('os_files',[]);f.unshift({name:file.name,content:ev.target.result,date:td()});sv('os_files',f);pMe()};r.readAsText(file,'UTF-8')};
window.dFile=function(i){var f=ld('os_files',[]);f.splice(i,1);sv('os_files',f);pMe()};
window.sSkN=function(id,v){var n=ld('os_skn',{});n[id]=v;sv('os_skn',n)};

function pMe(){
  var p=ld('os_p',{});var sk=ld('os_sk',{exec:5,comm:5,fin:5,soc:5,learn:5,stress:5});
  var wld=ld('os_wld',{});var files=ld('os_files',[]);
  var tabs='<div class="tabs"><button class="tab '+(mT==='skill'?'on':'')+'" onclick="meSw(\'skill\')">◎ 能力</button><button class="tab '+(mT==='info'?'on':'')+'" onclick="meSw(\'info\')">◉ 基本信息</button><button class="tab '+(mT==='world'?'on':'')+'" onclick="meSw(\'world\')">🌐 世界定位</button><button class="tab '+(mT==='files'?'on':'')+'" onclick="meSw(\'files\')">📁 文件</button></div>';
  var h=tabs;
  if(mT==='skill'){
    var cx=140,cy=140,r=100;
    var pts=SKL.map(function(s,i){var a=(i/6)*2*Math.PI-Math.PI/2,rt=(sk[s[0]]||5)/10;return{x:cx+r*rt*Math.cos(a),y:cy+r*rt*Math.sin(a),lx:cx+(r+32)*Math.cos(a),ly:cy+(r+32)*Math.sin(a),n:s[1],id:s[0]}});
    var grd=[.25,.5,.75,1].map(function(rt){return SKL.map(function(_,i){var a=(i/6)*2*Math.PI-Math.PI/2;return(cx+r*rt*Math.cos(a))+','+(cy+r*rt*Math.sin(a))}).join(' ')});
    h+='<div class="card">';
    if(p.name)h+='<div style="margin-bottom:10px"><div style="font-size:15px;font-weight:500">'+ee(p.name)+'</div>'+(p.tagline?'<div style="font-size:12px;color:var(--tx2);margin-top:2px">'+ee(p.tagline)+'</div>':'')+'</div>';
    h+='<div style="font-size:11px;color:var(--tx2);margin-bottom:8px">点击技能名称查看详情</div>';
    h+='<div style="display:flex;justify-content:center"><svg width="280" height="280" viewBox="0 0 280 280">';
    grd.forEach(function(g){h+='<polygon points="'+g+'" fill="none" stroke="#E8E4DC" stroke-width="1"/>'});
    SKL.forEach(function(_,i){var a=(i/6)*2*Math.PI-Math.PI/2;h+='<line x1="'+cx+'" y1="'+cy+'" x2="'+(cx+r*Math.cos(a))+'" y2="'+(cy+r*Math.sin(a))+'" stroke="#E8E4DC" stroke-width="1"/>'});
    h+='<polygon points="'+pts.map(function(pt){return pt.x+','+pt.y}).join(' ')+'" fill="rgba(45,82,160,.12)" stroke="#2D52A0" stroke-width="2"/>';
    pts.forEach(function(pt){var sel=sK===pt.id;h+='<circle cx="'+pt.x+'" cy="'+pt.y+'" r="4" fill="#2D52A0"/><text x="'+pt.lx+'" y="'+pt.ly+'" fill="'+(sel?'#2D52A0':'#5A6478')+'" font-size="12" font-weight="'+(sel?600:400)+'" text-anchor="middle" dominant-baseline="middle" style="cursor:pointer" onclick="ckSk(\''+pt.id+'\')">'+pt.n+'</text>'});
    h+='</svg></div><div style="display:flex;justify-content:center;gap:12px;flex-wrap:wrap;margin-top:10px">';
    SKL.forEach(function(s){h+='<div style="text-align:center;cursor:pointer" onclick="ckSk(\''+s[0]+'\')"><div style="font-size:9px;color:var(--tx2)">'+s[1]+'</div><div style="font-size:14px;font-weight:500;color:var(--bl)">'+(sk[s[0]]||5)+'</div></div>'});
    h+='</div><div style="display:flex;justify-content:center;margin-top:11px"><button class="btn s" onclick="mA=!mA;sK=null;pMe()">'+(mA?'收起':'📊 开始自我评估')+'</button></div></div>';
    if(sK){var sd=SKL.filter(function(x){return x[0]===sK})[0];if(sd){var ns=ld('os_skn',{});h+='<div style="background:var(--ibg);border:.5px solid var(--ibd);border-radius:10px;padding:13px 15px;margin-bottom:9px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><div><div style="font-size:15px;font-weight:500;color:var(--bl)">'+sd[1]+'</div><div style="font-size:11px;color:var(--bl2);margin-top:2px">'+sd[2]+'</div></div><div style="font-size:22px;font-weight:500;color:var(--bl)" id="sv'+sd[0]+'">'+(sk[sd[0]]||5)+'<span style="font-size:11px;color:var(--tx2)">/10</span></div></div><div style="font-size:12px;color:var(--bl2);line-height:1.6;margin-bottom:10px">'+sd[3]+'</div><input type="range" min="1" max="10" value="'+(sk[sd[0]]||5)+'" oninput="sSk(\''+sd[0]+'\',+this.value)"><textarea rows="2" placeholder="备注：现状、想提升的方向……" oninput="sSkN(\''+sd[0]+'\',this.value)" style="margin-top:8px">'+ee(ns[sd[0]]||'')+'</textarea></div>';}}
    if(mA){h+='<div class="card"><span class="lbl">📊 六维自我评估</span>';SKL.forEach(function(s){h+='<div style="background:var(--sec);border-radius:9px;padding:10px 12px;margin-bottom:8px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px"><div><div style="font-size:13px;font-weight:500">'+s[1]+'</div><div style="font-size:11px;color:var(--tx2)">'+s[3]+'</div></div><span style="font-size:16px;font-weight:500;color:var(--bl)" id="sv'+s[0]+'">'+(sk[s[0]]||5)+'<span style="font-size:10px;color:var(--tx2)">/10</span></span></div><input type="range" min="1" max="10" value="'+(sk[s[0]]||5)+'" oninput="sSk(\''+s[0]+'\',+this.value)"></div>'});h+='</div>';}
  }
  if(mT==='info'){h+='<div class="card"><span class="lbl">姓名/ID</span><input type="text" value="'+ee(p.name||'')+'" placeholder="你叫什么" oninput="sP(\'name\',this.value)" style="font-size:15px;font-weight:500;margin-bottom:7px"><input type="text" value="'+ee(p.tagline||'')+'" placeholder="用一句话描述现在的你" oninput="sP(\'tagline\',this.value)"></div><div class="card"><span class="lbl">当前人生阶段</span><input type="text" value="'+ee(p.phase||'')+'" placeholder="e.g. LSE Year 1" oninput="sP(\'phase\',this.value)" style="margin-top:5px"></div><div class="card"><span class="lbl">正式简历摘要</span><textarea rows="5" placeholder="教育经历、实习、社团……" oninput="sP(\'bio\',this.value)" style="margin-top:5px">'+ee(p.bio||'')+'</textarea></div><div class="card" style="border-style:dashed"><span class="lbl">🔒 非标版（私密）</span><span class="hint">只有你自己看</span><textarea rows="3" placeholder="失败的事、真实动机……" oninput="sP(\'unlisted\',this.value)">'+ee(p.unlisted||'')+'</textarea></div>';}
  if(mT==='world'){var wf=WLD.filter(function(w){return wld[w[0]]&&wld[w[0]].trim()}).length;h+='<div class="card"><div style="display:flex;justify-content:space-between;margin-bottom:4px"><span class="lbl" style="margin:0">完善度</span><span style="font-size:11px;color:var(--bl);font-weight:500">'+wf+'/'+WLD.length+'</span></div><div class="pb"><div class="pf" style="width:'+Math.round(wf/WLD.length*100)+'%"></div></div></div>';WLD.forEach(function(w){h+='<div class="card" style="margin-bottom:7px"><span class="lbl">'+w[1]+'</span><span class="hint">'+w[2]+'</span><input type="text" value="'+ee(wld[w[0]]||'')+'" placeholder="填写实际情况" oninput="sWld(\''+w[0]+'\',this.value)"></div>'});}
  if(mT==='files'){h+='<div class="card"><span class="lbl">添加文件</span><input type="text" id="fn" placeholder="文件名称 e.g. CV 2025" style="margin-bottom:7px"><textarea rows="4" id="fc" placeholder="粘贴文件内容……"></textarea><div style="display:flex;gap:7px;margin-top:8px"><button class="btn" onclick="aFile()">+ 保存</button><label style="flex:1;padding:9px;border-radius:7px;border:.5px solid var(--bd);text-align:center;cursor:pointer;font-size:11px;color:var(--tx2)">📁 上传文本<input type="file" accept=".txt,.md" style="display:none" onchange="upFile(this)"></label></div></div>';if(!files.length)h+='<p style="text-align:center;color:var(--tx2);padding:18px 0;font-size:12px">还没有文件</p>';files.forEach(function(f,i){h+='<div class="card" style="margin-bottom:7px"><div style="display:flex;justify-content:space-between;align-items:center"><div><div style="font-size:13px;font-weight:500">📄 '+ee(f.name)+'</div><div style="font-size:10px;color:var(--tx2)">'+f.date+' · '+f.content.length+'字</div></div><button onclick="dFile('+i+')" style="background:none;border:none;cursor:pointer;color:var(--tx2)">✕</button></div><button onclick="xp(\'ff'+i+'\',this,\'展开\',\'收起\')" style="background:none;border:none;cursor:pointer;color:var(--bl);font-size:11px;margin-top:6px">展开</button><div id="ff'+i+'" style="display:none;margin-top:7px;background:var(--sec);border-radius:7px;padding:9px;font-size:11px;line-height:1.6;max-height:150px;overflow-y:auto;white-space:pre-wrap">'+ee(f.content.slice(0,600))+'</div></div>'});}
  $('ct').innerHTML=h;
}

var rT='am';
window.rSw=function(t){rT=t;pRec()};
window.sR=function(f,v){var tk=td();var all=ld('os_rec',{});if(!all[tk])all[tk]={};all[tk][f]=v;sv('os_rec',all)};
window.sSc=function(f,v){var tk=td();var all=ld('os_rec',{});if(!all[tk])all[tk]={};all[tk][f]=+v;sv('os_rec',all);var el=$('sc'+f);if(el)el.textContent=v};
var rAI=false;
window.doAI=function(){
  var tk=td();var d=ld('os_rec',{})[tk]||{};
  if(!d.done&&!d.t1)return;
  rAI=true;pRec();
  var msg='今日3件事：'+[d.t1,d.t2,d.t3].filter(Boolean).join('、')+'\n完成：'+(d.done||'')+'\n不足：'+(d.bad||'')+'\n学到：'+(d.learn||'')+'\n总体：'+(d.st||5)+'/10\n\n请给：①一句真诚点评②明日最该改进1件事③一个值得思考的问题。换行分段，80字内。';
  fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:300,messages:[{role:'user',content:msg}]})})
  .then(function(r){return r.json()})
  .then(function(data){var t2=ld('os_rec',{});if(!t2[tk])t2[tk]={};t2[tk].ai=(data.content&&data.content[0]&&data.content[0].text)||'失败';sv('os_rec',t2);rAI=false;pRec()})
  .catch(function(){var t3=ld('os_rec',{});if(!t3[tk])t3[tk]={};t3[tk].ai='连接失败';sv('os_rec',t3);rAI=false;pRec()});
};

function pRec(){
  var tk=td();var all=ld('os_rec',{});var d=all[tk]||{};
  var h='<div class="tabs"><button class="tab '+(rT==='am'?'on':'')+'" onclick="rSw(\'am\')">☀ 早间</button><button class="tab '+(rT==='pm'?'on':'')+'" onclick="rSw(\'pm\')">🌙 晚间复盘</button><button class="tab '+(rT==='q'?'on':'')+'" onclick="rSw(\'q\')">⚡ 极简版</button><button class="tab '+(rT==='h'?'on':'')+'" onclick="rSw(\'h\')">▤ 历史</button></div>';
  if(rT==='am'){
    if(d.submitted){
      h+='<div class="card" style="background:var(--sbg);border-color:var(--sbd);text-align:center;padding:18px"><div style="font-size:20px;margin-bottom:8px">✓</div><div style="font-size:14px;font-weight:500;color:var(--stx)">今日已归档</div><div style="font-size:11px;color:var(--stx);margin-top:4px">'+tk+'</div></div>';
      if(d.t1||d.t2||d.t3)h+='<div class="card"><span class="lbl">今日3件事</span>'+[d.t1,d.t2,d.t3].filter(Boolean).map(function(t,i){return'<div style="font-size:13px;padding:5px 0;border-bottom:.5px solid var(--bd)">'+['①','②','③'][i]+' '+ee(t)+'</div>'}).join('')+'</div>';
      if(d.avoid)h+='<div class="card"><span class="lbl">避坑提醒</span><div style="font-size:13px;color:var(--tx2);margin-top:4px">'+ee(d.avoid)+'</div></div>';
      h+='<button class="btn g w" onclick="rSw(\"h\")">查看历史记录 →</button>';
    } else {
      h+='<div class="card"><span class="lbl">📋 今日最重要的3件事</span><input type="text" value="'+ee(d.t1||'')+'" placeholder="① 最重要的一件事" oninput="sR(\'t1\',this.value)" style="margin-top:6px;margin-bottom:6px"><input type="text" value="'+ee(d.t2||'')+'" placeholder="② 第二件事" oninput="sR(\'t2\',this.value)" style="margin-bottom:6px"><input type="text" value="'+ee(d.t3||'')+'" placeholder="③ 第三件事" oninput="sR(\'t3\',this.value)"></div><div class="card"><span class="lbl">避坑提醒/微习惯</span><textarea rows="2" placeholder="e.g. 不要一开始就刷手机……" oninput="sR(\'avoid\',this.value)" style="margin-top:5px">'+ee(d.avoid||'')+'</textarea></div>'+(d.t1?'<div class="card" style="background:var(--ibg);border:none"><span class="hint" style="margin:0;color:var(--bl)">目标已设定，去做就好，晚上再来复盘。</span></div>':'');} }
  if(rT==='pm'){
    if(d.submitted){

window.submitRec = function(){
  var tk=td();var all=ld('os_rec',{});

};

window.exportData = function(){
  var keys=['os_p','os_sk','os_skn','os_wld','os_files','os_rec','os_sp','os_pdca','os_tp','os_bel','os_st','os_col','os_fwe'];
  var data={};
  keys.forEach(function(k){var v=localStorage.getItem(k);if(v)data[k]=JSON.parse(v)});
  data._exported=new Date().toISOString();
  var blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='人生OS数据备份_'+new Date().toISOString().split('T')[0]+'.json';
  a.click();
};
window.importData = function(inp){
  var file=inp.files[0];if(!file)return;
  var r=new FileReader();
  r.onload=function(e){
    try{
      var data=JSON.parse(e.target.result);
      var keys=['os_p','os_sk','os_skn','os_wld','os_files','os_rec','os_sp','os_pdca','os_tp','os_bel','os_st','os_col','os_fwe'];
      var count=0;
      keys.forEach(function(k){if(data[k]!==undefined){localStorage.setItem(k,JSON.stringify(data[k]));count++;}});
      alert('导入成功！恢复了 '+count+' 项数据，刷新页面生效。');
    }catch(ex){alert('文件格式错误，请使用从本 app 导出的 JSON 文件。');}
  };
  r.readAsText(file,'UTF-8');
};
